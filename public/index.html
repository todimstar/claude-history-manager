<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude History Manager</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <nav class="navbar">
      <div class="navbar-brand" @click="goHome">⚡ Claude History</div>
      <div class="navbar-nav">
        <span :class="{ active: currentView === 'dashboard' }" @click="goHome">仪表盘</span>
        <span :class="{ active: currentView === 'trash' }" @click="openTrash">🗑️ 回收站<em v-if="trashCount > 0" class="badge">{{ trashCount }}</em></span>
        <span :class="{ active: currentView === 'settings' }" @click="openSettings">⚙️ 设置</span>
      </div>
      <div class="navbar-search">
        <span class="icon">🔍</span>
        <input v-model="globalSearch" @keydown.enter="doGlobalSearch" placeholder="搜索所有对话..." />
      </div>
    </nav>

    <!-- Toast 通知 -->
    <div class="toast-container">
      <div v-for="(t, i) in toasts" :key="i" class="toast" :class="t.type">{{ t.message }}</div>
    </div>

    <!-- 确认弹窗（增强版） -->
    <div v-if="confirmDialog.show" class="modal-overlay" @click.self="confirmDialog.show = false">
      <div class="modal">
        <h3>{{ confirmDialog.title }}</h3>
        <p>{{ confirmDialog.message }}</p>
        <!-- 安全说明区 -->
        <div v-if="confirmDialog.safetyNote" class="safety-note">
          <div class="safety-icon">🛡️</div>
          <div class="safety-text" v-html="confirmDialog.safetyNote"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" @click="confirmDialog.show = false">取消</button>
          <button class="btn" :class="confirmDialog.btnClass || 'btn-warning'" @click="confirmDialog.onConfirm(); confirmDialog.show = false">
            {{ confirmDialog.btnText || '确认' }}
          </button>
        </div>
      </div>
    </div>

    <div class="main-content">
      <!-- ════ 仪表盘 ════ -->
      <template v-if="currentView === 'dashboard'">
        <div v-if="loading" class="loading"><div class="spinner"></div>加载中...</div>
        <template v-else>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="label">总磁盘占用</div>
              <div class="value">{{ stats.total?.formatted || '—' }}</div>
            </div>
            <div class="stat-card">
              <div class="label">项目数</div>
              <div class="value">{{ projects.length }}</div>
            </div>
            <div class="stat-card">
              <div class="label">总会话数</div>
              <div class="value">{{ totalSessions }}</div>
            </div>
            <div class="stat-card">
              <div class="label" style="display:flex;align-items:center;gap:6px">
                调试日志
                <span class="help-tip" title="查看「孤立」的调试日志：即对应的会话 .jsonl 已不存在的 debug 文件。可选择移至回收站，之后可恢复。">?</span>
                <button class="btn btn-ghost" style="font-size:11px;padding:2px 8px" @click="cleanupDebug">清理孤立</button>
              </div>
              <div class="value">{{ debugInfo.formatted }}</div>
              <div class="sub">{{ debugInfo.count }} 个文件</div>
            </div>
            <div class="stat-card">
              <div class="label" style="display:flex;align-items:center;gap:6px">
                文件历史
                <span class="help-tip" title="查看「孤立」的文件编辑历史：即对应的会话 .jsonl 已不存在的 file-history 目录。可选择移至回收站，之后可恢复。">?</span>
                <button class="btn btn-ghost" style="font-size:11px;padding:2px 8px" @click="cleanupFileHistory">清理孤立</button>
              </div>
              <div class="value">{{ fileHistoryInfo.formatted }}</div>
              <div class="sub">{{ fileHistoryInfo.count }} 个目录</div>
            </div>
          </div>

          <!-- 磁盘占用条 -->
          <div class="disk-bar-container" v-if="stats.breakdown">
            <h3>磁盘占用分布</h3>
            <div class="disk-bar">
              <div v-for="seg in stats.breakdown" :key="seg.name" class="disk-bar-segment"
                :style="{ width: Math.max(seg.size / stats.total.size * 100, 0.5) + '%', background: seg.color }"
                :title="seg.name + ': ' + seg.formatted"></div>
            </div>
            <div class="disk-legend">
              <div v-for="seg in stats.breakdown" :key="seg.name" class="disk-legend-item">
                <div class="disk-legend-dot" :style="{ background: seg.color }"></div>
                {{ seg.name }} — {{ seg.formatted }}
              </div>
            </div>
          </div>

          <div class="section-title">📁 项目列表</div>
          <div class="project-grid">
            <div v-for="proj in projects" :key="proj.name" class="project-card" @click="openProject(proj.name)">
              <div class="name">{{ proj.displayName }}</div>
              <div v-if="proj.isFallback" class="fallback-hint" title="路径由正则推断，可能不准确。新建一次对话即可自动修正。">⚠️ 路径推断</div>
              <div class="meta">
                <span>💬 {{ proj.sessionCount }} 会话</span>
                <span>💾 {{ proj.sizeFormatted }}</span>
              </div>
            </div>
          </div>

          <!-- 风险提示 -->
          <div class="knowledge-card" style="margin-top:24px;border-color:var(--warning)">
            <div class="kc-title">⚠️ 风险提示</div>
            <div class="kc-body">
              <p>本工具直接操作 <code>~/.claude/</code> 目录中的文件。所有删除操作（即使是移至回收站）均存在风险。<strong>数据无价</strong>，使用本工具即代表你了解并自愿承担可能的文件/会话丢失风险。</p>
              <p>本项目由 AI 辅助生成，作者无法对代码的完整性和正确性做出保证。建议操作前备份重要数据。</p>
            </div>
          </div>
        </template>
      </template>

      <!-- ════ 搜索结果 ════ -->
      <template v-if="currentView === 'search'">
        <div class="list-header">
          <div class="left">
            <button class="back-btn" @click="goHome">← 返回</button>
            <h2>搜索结果: "{{ searchKeyword }}" ({{ searchResults.length }} 条)</h2>
          </div>
        </div>
        <div v-if="loading" class="loading"><div class="spinner"></div>搜索中...</div>
        <div v-else-if="searchResults.length === 0" class="empty-state">未找到匹配的对话</div>
        <div v-else class="search-results">
          <div v-for="hit in searchResults" :key="hit.sessionId" class="search-hit" @click="openSession(hit.project, hit.sessionId)">
            <div class="hit-project">📁 {{ hit.project }}</div>
            <div class="hit-preview" v-html="highlightKeyword(hit.preview, searchKeyword)"></div>
          </div>
        </div>
      </template>

      <!-- ════ 会话列表 ════ -->
      <template v-if="currentView === 'sessions'">
        <div class="list-header">
          <div class="left">
            <button class="back-btn" @click="goHome">← 返回</button>
            <h2>{{ currentProjectDisplay }}</h2>
            <input class="filter-input" v-model="sessionFilter" placeholder="过滤会话..." />
            <label class="toggle-label">
              <input type="checkbox" v-model="hideEmpty" /> 隐藏空会话
            </label>
          </div>
          <div>
            <button class="btn btn-ghost" @click="toggleSelectAll" style="margin-right:8px">
              {{ allSelected ? '取消全选' : '全选' }}
            </button>
            <button class="btn btn-warning" :disabled="selectedSessions.length === 0" @click="batchDelete">
              移至回收站 ({{ selectedSessions.length }})
            </button>
          </div>
        </div>
        <div v-if="loading" class="loading"><div class="spinner"></div>加载会话列表...</div>
        <div v-else-if="filteredSessions.length === 0" class="empty-state">暂无会话</div>
        <div v-else class="session-list">
          <div v-for="s in filteredSessions" :key="s.sessionId" class="session-item"
            :class="{ selected: selectedSessions.includes(s.sessionId) }">
            <input type="checkbox" class="session-checkbox"
              :checked="selectedSessions.includes(s.sessionId)"
              @change="toggleSelect(s.sessionId)" @click.stop />
            <div class="session-body" @click="openSession(currentProject, s.sessionId)">
              <div class="session-preview">{{ s.firstUserMsg }}</div>
              <div class="session-meta">
                <span>{{ formatDate(s.lastModified) }}</span>
                <span>{{ s.messageCount }} 条消息</span>
                <span v-if="s.gitBranch" class="tag tag-accent">{{ s.gitBranch }}</span>
                <span v-if="s.hasSubagents" class="tag tag-warning">有子代理</span>
                <span v-if="s.version" class="tag">v{{ s.version }}</span>
              </div>
              <div class="session-files" v-if="s.files">
                <span class="file-path" :title="s.files.conversation">📄 {{ s.files.conversation }}</span>
                <span v-if="s.files.debug" class="file-path" :title="s.files.debug">🐛 debug</span>
                <span v-if="s.files.subagents" class="file-path" :title="s.files.subagents">🤖 subagents</span>
                <span v-if="s.files.fileHistory" class="file-path" :title="s.files.fileHistory">📝 file-history</span>
              </div>
            </div>
            <div class="session-size">{{ s.fileSizeFormatted }}</div>
          </div>
        </div>
      </template>

      <!-- ════ 对话详情 ════ -->
      <template v-if="currentView === 'detail'">
        <div class="list-header">
          <div class="left">
            <button class="back-btn" @click="backToSessions">← 返回列表</button>
            <h2>对话详情</h2>
          </div>
          <button class="btn btn-warning" @click="deleteSingle(currentProject, currentSessionId)">移至回收站</button>
        </div>
        <div v-if="loading" class="loading"><div class="spinner"></div>加载对话内容...</div>
        <template v-else>
          <div class="detail-header">
            <div class="info-item"><strong>Session:</strong> {{ currentSessionId }}</div>
            <div class="info-item" v-if="detailMeta.gitBranch"><strong>分支:</strong> {{ detailMeta.gitBranch }}</div>
            <div class="info-item" v-if="detailMeta.version"><strong>版本:</strong> {{ detailMeta.version }}</div>
            <div class="info-item"><strong>消息数:</strong> {{ detailMessages.length }}</div>
          </div>
          <!-- 关联文件面板：让用户眼见为实 -->
          <div class="files-panel" v-if="detailFiles && detailFiles.conversation">
            <div class="fp-title">📂 关联源文件</div>
            <div class="fp-body">
              <div class="fp-row">
                <span class="fp-icon">📄</span>
                <span class="fp-label">对话记录</span>
                <code class="fp-path">{{ detailFiles.conversation }}</code>
                <button class="btn btn-ghost btn-open" @click="openInExplorer(detailFiles.conversation)" title="在文件管理器中打开">📂</button>
              </div>
              <div class="fp-row" v-if="detailFiles.debug">
                <span class="fp-icon">🐛</span>
                <span class="fp-label">调试日志</span>
                <code class="fp-path">{{ detailFiles.debug }}</code>
                <button class="btn btn-ghost btn-open" @click="openInExplorer(detailFiles.debug)" title="在文件管理器中打开">📂</button>
              </div>
              <div class="fp-row" v-if="detailFiles.subagents">
                <span class="fp-icon">🤖</span>
                <span class="fp-label">子代理</span>
                <code class="fp-path">{{ detailFiles.subagents }}</code>
                <button class="btn btn-ghost btn-open" @click="openInExplorer(detailFiles.subagents)" title="在文件管理器中打开">📂</button>
              </div>
              <div class="fp-row" v-if="detailFiles.fileHistory">
                <span class="fp-icon">📝</span>
                <span class="fp-label">文件历史</span>
                <code class="fp-path">{{ detailFiles.fileHistory }}</code>
                <button class="btn btn-ghost btn-open" @click="openInExplorer(detailFiles.fileHistory)" title="在文件管理器中打开">📂</button>
              </div>
            </div>
          </div>
          <div class="messages-container">
            <template v-for="(msg, idx) in detailMessages" :key="idx">
              <div v-if="msg.type === 'user' && getUserText(msg)" class="msg-bubble user">
                {{ getUserText(msg) }}
                <div class="msg-timestamp">{{ formatTime(msg.timestamp) }}</div>
              </div>
              <div v-else-if="msg.type === 'assistant' && getAssistantText(msg)" class="msg-bubble assistant">
                {{ getAssistantText(msg) }}
                <template v-if="getToolCalls(msg).length">
                  <div v-for="(tc, ti) in getToolCalls(msg)" :key="ti" class="tool-call">
                    <div class="tool-call-header" @click="tc._open = !tc._open">
                      <span class="arrow" :class="{ open: tc._open }">▶</span>
                      🔧 {{ tc.name }}
                    </div>
                    <div v-if="tc._open" class="tool-call-body">{{ JSON.stringify(tc.input, null, 2) }}</div>
                  </div>
                </template>
                <div class="msg-timestamp">{{ formatTime(msg.timestamp) }}</div>
              </div>
              <div v-else-if="msg.type === 'assistant' && !getAssistantText(msg) && getToolCalls(msg).length" class="msg-bubble assistant">
                <template v-for="(tc, ti) in getToolCalls(msg)" :key="ti">
                  <div class="tool-call">
                    <div class="tool-call-header" @click="tc._open = !tc._open">
                      <span class="arrow" :class="{ open: tc._open }">▶</span>
                      🔧 {{ tc.name }}
                    </div>
                    <div v-if="tc._open" class="tool-call-body">{{ JSON.stringify(tc.input, null, 2) }}</div>
                  </div>
                </template>
                <div class="msg-timestamp">{{ formatTime(msg.timestamp) }}</div>
              </div>
              <div v-else-if="msg.type === 'system' && msg.content" class="msg-bubble system">
                {{ stripTags(msg.content).slice(0, 120) }}
              </div>
            </template>
          </div>
        </template>
      </template>

      <!-- ════ 回收站 ════ -->
      <template v-if="currentView === 'trash'">
        <div class="list-header">
          <div class="left">
            <button class="back-btn" @click="goHome">← 返回</button>
            <h2>🗑️ 回收站</h2>
            <span class="badge-info" v-if="trashData.totalFormatted">占用 {{ trashData.totalFormatted }}</span>
          </div>
          <button class="btn btn-danger" :disabled="trashData.items.length === 0" @click="purgeTrash">彻底清空</button>
        </div>

        <!-- 回收站说明 -->
        <div class="knowledge-card">
          <div class="kc-title">📋 回收站使用说明</div>
          <div class="kc-body">
            <p>删除的会话和孤立文件会暂存在此处，包括对话记录、调试日志和文件编辑历史。</p>
            <ul>
              <li><strong>恢复</strong>：点击「恢复」按钮，数据会原路返回。普通会话会恢复 <code>/resume</code> 索引；孤立文件会恢复到原始目录</li>
              <li><strong>彻底删除</strong>：确认不再需要后，可逐个或一键清空。此操作<em>不可逆</em>——<strong>数据无价</strong>，请务必三思</li>
              <li><strong>建议</strong>：删除后先用 Claude Code 的 <code>/resume</code> 测试一下是否正常，确认无误再彻底删除</li>
            </ul>
          </div>
        </div>

        <div v-if="loading" class="loading"><div class="spinner"></div>加载回收站...</div>
        <div v-else-if="trashData.items.length === 0" class="empty-state">回收站为空 ✨</div>
        <div v-else class="trash-list">
          <div v-for="item in trashData.items" :key="item.sessionId" class="trash-item">
            <div class="trash-body">
              <div class="trash-preview">{{ item.preview }}</div>
              <div class="trash-meta">
                <span>📁 {{ item.project || '(孤立文件)' }}</span>
                <span>🕐 删除于 {{ formatDate(item.deletedAt) }}</span>
                <span>💾 {{ item.sizeFormatted }}</span>
                <span v-for="tag in item.movedItems" :key="tag" class="tag">{{ tag }}</span>
              </div>
              <div class="trash-files">
                <span class="file-path" :title="'原项目目录: ' + item.project">🔑 Session: {{ item.sessionId }}</span>
              </div>
            </div>
            <div class="trash-actions">
              <button class="btn btn-primary" @click="restoreFromTrash(item.sessionId)">恢复</button>
              <button class="btn btn-danger" @click="permanentDelete(item.sessionId)">彻底删除</button>
            </div>
          </div>
        </div>
      </template>

      <!-- ════ 孤立文件列表 ════ -->
      <template v-if="currentView === 'orphans'">
        <div class="list-header">
          <div class="left">
            <button class="back-btn" @click="goHome">← 返回</button>
            <h2>{{ orphanType === 'debug' ? '🐛 孤立调试日志' : '📝 孤立文件历史' }}</h2>
            <span class="badge-info" v-if="orphanTotalSize">共占用 {{ orphanTotalSize }}</span>
          </div>
          <button class="btn btn-warning" :disabled="orphanItems.length === 0" @click="cleanAllOrphans">
            全部移至回收站 ({{ orphanItems.length }})
          </button>
        </div>

        <!-- 说明卡片 -->
        <div class="knowledge-card">
          <div class="kc-title">📋 什么是「孤立」文件？</div>
          <div class="kc-body">
            <p v-if="orphanType === 'debug'">
              以下是没有对应会话 <code>.jsonl</code> 的调试日志文件。可能是会话被手动删除或被 Claude Code 自动清理后遗留的。
              这些文件已无法关联到任何对话。点击「📂 打开」按钮可在文件管理器中查看确认。
            </p>
            <p v-else>
              以下是没有对应会话 <code>.jsonl</code> 的文件编辑历史目录。每个目录保存了该次会话中 Claude 编辑文件的版本快照。
              对应的会话已不存在，这些快照已无法关联到任何对话。点击「📂 打开」按钮可在文件管理器中查看内容。
            </p>
            <p><strong>安全说明：</strong>所有操作均为「移至回收站」而非直接删除。你可以随时在回收站中恢复。</p>
          </div>
        </div>

        <div v-if="loading" class="loading"><div class="spinner"></div>加载中...</div>
        <div v-else-if="orphanItems.length === 0" class="empty-state">没有孤立文件 ✨</div>
        <div v-else class="orphan-list">
          <div v-for="item in orphanItems" :key="item.sessionId" class="orphan-item">
            <div class="orphan-body">
              <div class="orphan-session">Session: {{ item.sessionId }}</div>
              <div class="orphan-meta">
                <span>💾 {{ item.sizeFormatted }}</span>
                <span>🕐 {{ formatDate(item.lastModified) }}</span>
                <span v-if="item.fileCount">📄 {{ item.fileCount }} 个文件</span>
              </div>
              <div class="orphan-path">
                <code>{{ item.filePath || item.dirPath }}</code>
              </div>
            </div>
            <div class="orphan-actions">
              <button class="btn btn-ghost btn-open" @click.stop="openInExplorer(item.filePath || item.dirPath)" title="在文件管理器中打开">
                📂 打开
              </button>
              <button class="btn btn-warning" @click.stop="deleteOrphan(item)">移至回收站</button>
            </div>
          </div>
        </div>
      </template>

      <!-- ════ 设置 ════ -->
      <template v-if="currentView === 'settings'">
        <div class="list-header">
          <div class="left">
            <button class="back-btn" @click="goHome">← 返回</button>
            <h2>⚙️ 设置</h2>
          </div>
        </div>

        <!-- 自动清理策略 -->
        <div class="settings-card">
          <div class="sc-title">🕐 自动清理策略 (cleanupPeriodDays)</div>
          <div class="sc-body">
            <div class="setting-row">
              <label>Claude Code 自动删除超过此天数的会话日志：</label>
              <div class="setting-input-group">
                <input type="number" v-model.number="settingsForm.cleanupPeriodDays" min="1" max="99999" class="setting-input" />
                <span class="setting-unit">天</span>
                <button class="btn btn-primary" @click="saveSettings" :disabled="settingsSaving">
                  {{ settingsSaving ? '保存中...' : '保存' }}
                </button>
              </div>
            </div>
            <div class="preset-buttons">
              <span class="preset-label">快速设置：</span>
              <button class="btn btn-ghost" @click="settingsForm.cleanupPeriodDays = 30">30 天 (默认)</button>
              <button class="btn btn-ghost" @click="settingsForm.cleanupPeriodDays = 365">365 天 (推荐)</button>
              <button class="btn btn-ghost" @click="settingsForm.cleanupPeriodDays = 99999">99999 天 (永不清理)</button>
            </div>
            <div class="setting-file-row" v-if="settingsFilePath">
              <span class="setting-file-label">📄 配置文件路径：</span>
              <code class="fp-path">{{ settingsFilePath }}</code>
              <button class="btn btn-ghost btn-open" @click="openInExplorer(settingsFilePath)" title="在文件管理器中打开，可手动确认修改">📂 打开</button>
            </div>
          </div>
        </div>

        <!-- 背景知识 -->
        <div class="knowledge-card">
          <div class="kc-title">📖 为什么需要关注这个设置？</div>
          <div class="kc-body">
            <p><strong>问题背景：</strong>Claude Code 默认在启动时<em>静默删除</em>超过 30 天的会话日志。许多用户完全不知道这个行为，
              直到备份对比时才发现历史记录凭空消失。</p>

            <p><strong>大佬的做法：</strong>Django 联合创始人
              <a href="https://simonwillison.net/2025/Oct/22/claude-code-logs/" target="_blank">Simon Willison</a>
              专门撰文警告——"Don't let Claude Code delete your session logs"（别让 Claude Code 删你的日志）。
              他自己积累了 379MB 的会话日志，并设置 <code>cleanupPeriodDays: 99999</code>（约 274 年）来阻止自动清理。</p>

            <p><strong>为什么日志重要：</strong></p>
            <ul>
              <li>日志是你的<strong>安全审计记录</strong>——当 AI 改坏了代码，日志是追溯"它做了什么"的唯一凭据</li>
              <li>日志记录了每次文件编辑的完整 diff，是<strong>代码恢复</strong>的最后一道防线</li>
              <li>如果你在做项目复盘或面试准备，历史日志是<strong>学习回顾</strong>的宝贵素材</li>
            </ul>

            <p><strong>已知 Bug：</strong>
              <a href="https://github.com/anthropics/claude-code/issues/18881" target="_blank">Issue #18881</a>
              报告了自动清理会误删<em>当天创建</em>的会话。
              <a href="https://github.com/anthropics/claude-code/issues/4172" target="_blank">Issue #4172</a>
              是最早发现此问题的用户报告。</p>

            <p><strong>官方文档：</strong>
              <a href="https://code.claude.com/docs/en/settings#available-settings" target="_blank">Claude Code Settings — Available Settings</a>
              中列出了 <code>cleanupPeriodDays</code> 参数的官方说明。</p>

            <p><strong>我们的建议：</strong>设为 <strong>365 天</strong>——既保留足够的历史，又不会让磁盘无限膨胀。
              配合本工具的磁盘统计和回收站功能，你可以精细管理空间。</p>
